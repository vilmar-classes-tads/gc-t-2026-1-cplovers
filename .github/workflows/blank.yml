name: Java CI com Maven + Docker

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Compilar e rodar testes com Maven
      run: mvn clean test

    - name: Build do projeto (gera o JAR)
      run: mvn clean package -DskipTests

    - name: Build da imagem Docker
      run: docker build -t gc-t-2026-1-cplovers:latest .

    - name: Listar imagens Docker (debug)
      run: docker images

    - name: Rodar container para teste
      run: docker run -d -p 8080:8080 --name app-test gc-t-2026-1-cplovers:latest

    - name: Esperar inicialização
      run: sleep 15

    - name: Testar endpoint (health check simples)
      run: curl -f http://localhost:8080 || true

    - name: Parar container
      run: docker stop app-test && docker rm app-test